kind = "web"
previewPath = "/"
title = "RydeWorks Dispatch"
version = "1.0.0"
id = "artifacts/rydeworks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19945
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rydeworks run dev"

[services.env]
PORT = "19945"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rydeworks", "run", "build"]
publicDir = "artifacts/rydeworks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
